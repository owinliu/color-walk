<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#111827"/>
  <title>Color Walk</title>
  <link rel="manifest" href="./manifest.json"/>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body>
  <main id="app"></main>

  <div id="photoSheet" class="sheet hidden">
    <div class="sheet-card">
      <h3>选择照片来源</h3>
      <button id="pickCamera" class="btn primary">拍照</button>
      <button id="pickAlbum" class="btn">从相册选择</button>
      <button id="closeSheet" class="btn ghost">取消</button>
    </div>
  </div>

  <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden>
  <input id="albumInput" type="file" accept="image/*" hidden>
  <canvas id="work" hidden></canvas>

  <script src="./app.js"></script>
</body>
</html>
