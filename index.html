<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#111827"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Color Walk</title>
  <link rel="manifest" href="./manifest.json"/>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--bd:#e5e7eb}
    *{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:900px;margin:0 auto;padding:14px}.card{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:12px}
    h1{margin:0 0 8px;font-size:1.2rem}.muted{color:var(--muted);font-size:.9rem}.small{font-size:.82rem}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}
    .chip{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--bd);border-radius:999px;padding:8px 12px;background:#fff}
    .dot{width:22px;height:22px;border-radius:999px;border:1px solid rgba(0,0,0,.15)}
    button,label{border:1px solid var(--bd);background:#fff;border-radius:10px;padding:10px 12px;font-weight:600;cursor:pointer;color:var(--text)}
    .primary{background:#111827;color:#fff;border-color:#111827} input[type=file]{display:none}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .slot{aspect-ratio:1/1;border:1px dashed var(--bd);border-radius:10px;background:#fafafa;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted);position:relative}
    .slot img{width:100%;height:100%;object-fit:cover}.badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.75);color:#fff;font-size:.7rem;padding:2px 6px;border-radius:999px}
    .ok{color:#0f766e}.bad{color:#b91c1c}
    .ch-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .ch-card{border:1px solid var(--bd);border-radius:10px;padding:10px;background:#fff;cursor:pointer}
    .ch-card.active{border-color:#111827;box-shadow:0 0 0 2px rgba(17,24,39,.08)}
    .ch-top{display:flex;align-items:center;gap:8px}
    .ch-dot{width:14px;height:14px;border-radius:999px;border:1px solid rgba(0,0,0,.15)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:16px;z-index:99}
    .modal.show{display:flex}.panel{background:#fff;border-radius:14px;max-width:520px;width:100%;padding:12px}.panel img{width:100%;border-radius:10px;display:block}
    @media(max-width:640px){.wrap{padding:10px}.ch-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<main class="wrap">
  <section class="card">
    <h1>Color Walk · 今日同色挑战</h1>
    <p class="muted">每天最多 3 个随机挑战。可切换继续，超出时覆盖当天最早挑战。</p>
    <div class="row" style="margin-top:10px">
      <div class="chip"><span class="dot" id="dot"></span><div><div><b id="name">-</b></div><div class="muted" id="hex">-</div></div></div>
      <div class="row">
        <button id="newChallenge" class="primary">+ 新挑战（随机）</button>
        <button id="copyChallenge">复制挑战链接</button>
      </div>
    </div>
    <div class="muted small" id="challengeMeta" style="margin-top:8px"></div>
  </section>

  <section class="card">
    <div class="row" style="margin-bottom:8px"><b>今日挑战列表（最多3个）</b><span class="muted small" id="slotsInfo"></span></div>
    <div class="ch-grid" id="challengeList"></div>
  </section>

  <section class="card">
    <div class="row" style="margin-bottom:10px"><b>进度：<span id="count">0</span>/9</b><span id="status" class="muted">开始收集吧</span></div>
    <div class="row" style="margin-bottom:10px;justify-content:flex-start">
      <label class="primary" for="cameraInput">拍照</label>
      <input id="cameraInput" type="file" accept="image/*" capture="environment">
      <label for="albumInput">从相册选择</label>
      <input id="albumInput" type="file" accept="image/*">
      <button id="clear">清空当前挑战</button>
      <button id="export">导出九宫格</button>
    </div>
    <div class="grid" id="grid"></div>
  </section>
</main>

<div id="previewModal" class="modal" aria-hidden="true">
  <div class="panel">
    <div class="row" style="margin-bottom:8px"><b>长按图片可“存储到相册”</b><button id="closePreview">关闭</button></div>
    <img id="previewImg" alt="九宫格导出图"/>
    <p class="muted small" style="margin:8px 0 0">iPhone：长按图片 → 添加到照片。Android：长按图片 → 下载图片/保存图片。</p>
  </div>
</div>

<canvas id="cv" style="display:none"></canvas>
<script>
const COLORS=[
 {name:'樱桃红',hex:'#d7263d'},{name:'柑橘橙',hex:'#f57c00'},{name:'向日葵黄',hex:'#f4c430'},
 {name:'抹茶绿',hex:'#63a375'},{name:'湖水青',hex:'#2a9d8f'},{name:'天空蓝',hex:'#4f86f7'},
 {name:'鸢尾紫',hex:'#7e57c2'},{name:'雾霾灰',hex:'#8d99ae'},{name:'奶油米',hex:'#d4c2a8'}
];
const PASS_H=24, PASS_L=0.28, MAX=9, DAY_SLOT_MAX=3;
const $=id=>document.getElementById(id);
const today=new Date().toISOString().slice(0,10);
const dayKey=`cw:day:v3:${today}`;

function randColor(){return COLORS[Math.floor(Math.random()*COLORS.length)]}
function uid(){return `${Date.now()}-${Math.random().toString(36).slice(2,8)}`}
function nowStr(ts){const d=new Date(ts);return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function hex2rgb(h){const n=parseInt(h.replace('#',''),16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255}}
function rgb2hsl({r,g,b}){r/=255;g/=255;b/=255;const mx=Math.max(r,g,b),mn=Math.min(r,g,b);let h=0,s=0,l=(mx+mn)/2;if(mx!==mn){const d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);if(mx===r)h=(g-b)/d+(g<b?6:0);else if(mx===g)h=(b-r)/d+2;else h=(r-g)/d+4;h*=60}return{h,s,l}}
function match(a,b){const A=rgb2hsl(a),B=rgb2hsl(b);const dh=Math.min(Math.abs(A.h-B.h),360-Math.abs(A.h-B.h));return dh<=PASS_H&&Math.abs(A.l-B.l)<=PASS_L}

function loadDay(){
  try{
    const d=JSON.parse(localStorage.getItem(dayKey));
    if(d?.date===today && Array.isArray(d.challenges) && d.challenges.length){
      if(!d.currentId || !d.challenges.some(c=>c.id===d.currentId)) d.currentId=d.challenges[0].id;
      return d;
    }
  }catch(e){console.error(e)}
  const c=createChallenge();
  return {date:today,currentId:c.id,challenges:[c]};
}

function saveDay(){
  try{localStorage.setItem(dayKey,JSON.stringify(dayState));return true}
  catch(err){console.error('save failed',err);return false}
}

function createChallenge(){
  const target=randColor();
  return {id:uid(),createdAt:Date.now(),target,items:[]};
}

let dayState=loadDay();
renderAll();

function current(){return dayState.challenges.find(c=>c.id===dayState.currentId)}

function renderAll(){
  const cur=current();
  $('dot').style.background=cur.target.hex;$('name').textContent=cur.target.name;$('hex').textContent=cur.target.hex;
  $('count').textContent=cur.items.length;
  $('challengeMeta').textContent=`当前挑战：${cur.id.slice(0,8)} · 创建于 ${nowStr(cur.createdAt)}`;
  $('slotsInfo').textContent=`${dayState.challenges.length}/${DAY_SLOT_MAX}`;

  const cl=$('challengeList');cl.innerHTML='';
  dayState.challenges.forEach(ch=>{
    const div=document.createElement('div');
    div.className='ch-card'+(ch.id===dayState.currentId?' active':'');
    div.onclick=()=>{dayState.currentId=ch.id;saveDay();renderAll();};
    const done=ch.items.length>=MAX;
    div.innerHTML=`<div class="ch-top"><span class="ch-dot" style="background:${ch.target.hex}"></span><b>${ch.target.name}</b></div>
      <div class="muted small" style="margin-top:6px">进度：${ch.items.length}/${MAX} · ${done?'已完成':'进行中'}</div>
      <div class="muted small">创建：${nowStr(ch.createdAt)}</div>`;
    cl.appendChild(div);
  });

  const g=$('grid');g.innerHTML='';
  for(let i=0;i<MAX;i++){
    const s=document.createElement('div');s.className='slot';const it=cur.items[i];
    if(it){const img=new Image();img.src=it.data;s.appendChild(img);const b=document.createElement('span');b.className='badge';b.textContent='#'+(i+1);s.appendChild(b)}
    else s.textContent='空位 '+(i+1);
    g.appendChild(s);
  }
  $('status').className=cur.items.length===MAX?'ok':'muted';
  $('status').textContent=cur.items.length===MAX?'🎉 当前挑战已完成':'继续拍同色物体';
}

function toast(msg,ok){$('status').className=ok?'ok':'bad';$('status').textContent=msg;setTimeout(renderAll,1800)}

$('newChallenge').onclick=()=>{
  const c=createChallenge();
  if(dayState.challenges.length<DAY_SLOT_MAX){
    dayState.challenges.push(c);
    dayState.currentId=c.id;
    saveDay();renderAll();toast('已创建新挑战',1);
    return;
  }
  const oldest=[...dayState.challenges].sort((a,b)=>a.createdAt-b.createdAt)[0];
  const ok=confirm(`今日挑战已满3个，将覆盖最早挑战（${oldest.target.name} ${oldest.items.length}/9），继续？`);
  if(!ok) return;
  dayState.challenges=dayState.challenges.filter(x=>x.id!==oldest.id);
  dayState.challenges.push(c);
  dayState.currentId=c.id;
  saveDay();renderAll();toast('已覆盖最早挑战并创建新挑战',1);
};

$('copyChallenge').onclick=async()=>{
  const cur=current();
  const url=`${location.origin}${location.pathname}?date=${today}&cid=${cur.id}`;
  try{await navigator.clipboard.writeText(url);toast('挑战链接已复制',1)}catch{prompt('复制这个链接发给朋友：',url)}
};

$('clear').onclick=()=>{
  const cur=current();
  if(!confirm(`清空当前挑战（${cur.target.name}）已收集照片？`)) return;
  cur.items=[];
  if(!saveDay()) return toast('保存失败，请清理手机存储后重试',0);
  renderAll();toast('已清空当前挑战',1);
};

$('cameraInput').onchange=handlePick;
$('albumInput').onchange=handlePick;

async function handlePick(e){
  const file=e.target.files?.[0]; if(!file) return;
  const cur=current();
  if(cur.items.length>=MAX){toast('当前挑战已满9张',0);e.target.value='';return}
  try{
    let data=await fileToData(file);
    data=await normalizeImage(data);
    const avg=await centerColor(data);
    if(!match(avg,hex2rgb(cur.target.hex))){toast('颜色不够接近，再试试',0);e.target.value='';return}
    cur.items.push({data,at:Date.now()});
    if(!saveDay()){
      cur.items.pop();
      toast('保存失败：手机存储不足，请先导出后清空',0);
      e.target.value='';
      return;
    }
    renderAll();toast('收集成功 +1',1);
  }catch(err){
    console.error(err);
    toast('图片解析失败，请换一张或截图后再试',0);
  }
  e.target.value='';
}

$('export').onclick=async()=>{
  const cur=current();
  if(!cur.items.length) return toast('先拍几张再导出',0);
  const png=await makePoster(cur);
  const fileName=`color-walk-${today}-${cur.target.name}.png`;
  let shared=false;
  try{
    const file=await dataUrlToFile(png,fileName);
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({title:'Color Walk 九宫格',text:'我的 Color Walk 今日九宫格',files:[file]});
      shared=true;toast('已打开系统分享，可直接存到相册',1);
    }
  }catch(err){console.error(err)}
  if(!shared){const a=document.createElement('a');a.href=png;a.download=fileName;a.click();}
  showPreview(png);
};

function fileToData(f){return new Promise((res,rej)=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.onerror=rej;fr.readAsDataURL(f)})}
function dataUrlToFile(dataUrl,fileName){const [meta,base64]=dataUrl.split(',');const mime=(meta.match(/data:(.*?);base64/)||[])[1]||'image/png';const bin=atob(base64);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);return Promise.resolve(new File([arr],fileName,{type:mime}))}
function loadDataImage(src){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>res(img);img.onerror=rej;img.src=src})}
async function normalizeImage(dataUrl){const img=await loadDataImage(dataUrl);const c=document.createElement('canvas'),ctx=c.getContext('2d');const max=960;const scale=Math.min(1,max/Math.max(img.width,img.height));c.width=Math.max(1,Math.round(img.width*scale));c.height=Math.max(1,Math.round(img.height*scale));ctx.drawImage(img,0,0,c.width,c.height);return c.toDataURL('image/jpeg',0.72)}
function centerColor(src){return new Promise((res,rej)=>{const img=new Image();img.onload=()=>{const c=$('cv'),ctx=c.getContext('2d',{willReadFrequently:true});c.width=180;c.height=180;ctx.drawImage(img,0,0,180,180);const d=ctx.getImageData(40,40,100,100).data;let r=0,g=0,b=0,n=0;for(let i=0;i<d.length;i+=4){if(d[i+3]<10)continue;r+=d[i];g+=d[i+1];b+=d[i+2];n++}if(!n) return rej(new Error('empty image'));res({r:Math.round(r/n),g:Math.round(g/n),b:Math.round(b/n)})};img.onerror=rej;img.src=src})}

async function makePoster(ch){
 const c=document.createElement('canvas'),ctx=c.getContext('2d'); c.width=1080;c.height=1440;
 ctx.fillStyle='#f8fafc';ctx.fillRect(0,0,1080,1440);ctx.fillStyle=ch.target.hex;ctx.fillRect(0,0,1080,170);
 ctx.fillStyle='#fff';ctx.font='700 50px -apple-system';ctx.fillText('Color Walk',48,94);ctx.font='400 28px -apple-system';ctx.fillText(`${today} · ${ch.target.name} ${ch.target.hex}`,48,136);
 const pad=48,gap=18,cell=Math.floor((1080-pad*2-gap*2)/3);
 for(let i=0;i<9;i++){const x=pad+(i%3)*(cell+gap),y=220+Math.floor(i/3)*(cell+gap);round(ctx,x,y,cell,cell,16,'#e5e7eb');if(ch.items[i]){const img=await loadImg(ch.items[i].data);cover(ctx,img,x,y,cell,cell,16)}}
 return c.toDataURL('image/png');
}
function loadImg(src){return new Promise((r,j)=>{const i=new Image();i.onload=()=>r(i);i.onerror=j;i.src=src})}
function cover(ctx,img,x,y,w,h,rd){const sc=Math.max(w/img.width,h/img.height),nw=img.width*sc,nh=img.height*sc,ox=x+(w-nw)/2,oy=y+(h-nh)/2;ctx.save();rpath(ctx,x,y,w,h,rd);ctx.clip();ctx.drawImage(img,ox,oy,nw,nh);ctx.restore()}
function round(ctx,x,y,w,h,rd,fill){ctx.fillStyle=fill;rpath(ctx,x,y,w,h,rd);ctx.fill()}
function rpath(ctx,x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}

function showPreview(dataUrl){$('previewImg').src=dataUrl;$('previewModal').classList.add('show');$('previewModal').setAttribute('aria-hidden','false')}
function hidePreview(){$('previewModal').classList.remove('show');$('previewModal').setAttribute('aria-hidden','true')}
$('closePreview').onclick=hidePreview;
$('previewModal').addEventListener('click',(e)=>{if(e.target.id==='previewModal') hidePreview()});

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body>
</html>
